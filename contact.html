---
layout: single
title: "Contact"
permalink: /contact/
author_profile: true
---

<form action="https://formspree.io/{{ site.email }}" method="POST">
  <div class="form-group">
    <label for="contact-email">Email</label>
    <input id="contact-email" type="email" name="email" required class="required" style="width:100%;max-width:36rem;padding:0.5em;">
  </div>
  <div class="form-group">
    <label for="contact-message">Message</label>
    <textarea id="contact-message" name="content" rows="6" required class="required" style="width:100%;max-width:36rem;padding:0.5em;resize:vertical;"></textarea>
  </div>
  <input type="hidden" name="_next" value="{{ site.url }}{{ site.baseurl }}/thanks/" />
  <input type="hidden" name="_subject" value="New submission from website" />
  <input type="text" name="_gotcha" style="display:none" />
  <button type="submit" class="btn btn--primary">Send</button>
</form>
